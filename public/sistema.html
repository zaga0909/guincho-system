<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel - Vadeco'S Guinchos</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial;
      background:#071a33;
      color:white;
      padding:30px;
    }

    .topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
      gap:20px;
      flex-wrap:wrap;
    }

    h1{
      color:#ff8c00;
    }

    .topo-botoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .logout{
      background:red;
      color:white;
      border:none;
      padding:12px 18px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn3{
      background:#ff8c00;
      color:white;
      border:none;
      padding:12px 18px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .dashboard{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:40px;
    }

    .card{
      background:white;
      color:#111;
      padding:25px;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,.25);
    }

    .card h2{
      font-size:18px;
      margin-bottom:10px;
      color:#071a33;
    }

    .numero{
      font-size:38px;
      font-weight:bold;
      color:#ff8c00;
    }

    #lista{
      display:grid;
      gap:20px;
    }

    .pedido{
      background:white;
      color:#111;
      padding:20px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,.25);
    }

    .pedido h2{
      color:#071a33;
      margin-bottom:10px;
    }

    .pedido p{
      margin:6px 0;
    }

    .status{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      font-weight:bold;
      margin-top:10px;
      margin-bottom:15px;
    }

    .pendente{
      background:#ffe08a;
      color:#111;
    }

    .andamento{
      background:#5db2ff;
      color:white;
    }

    .finalizado{
      background:#39d98a;
      color:white;
    }

    .acoes{
      display:flex;
      gap:10px;
      margin-top:15px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn1{
      background:#2f9bff;
      color:white;
    }

    .btn2{
      background:#39d98a;
      color:white;
    }

    a{
      text-decoration:none;
    }

  </style>

</head>
<body>

<script>

if(localStorage.getItem("adminLogado") !== "sim"){

  window.location.href = "/login.html";

}

</script>

<div class="topo">

  <h1>🚛 Painel Vadeco'S Guinchos</h1>

  <div class="topo-botoes">

    <a href="/guincheiros.html">
      <button class="btn3">
        Guincheiros
      </button>
    </a>

    <button class="logout" onclick="sair()">
      Sair
    </button>

  </div>

</div>

<div class="dashboard">

  <div class="card">
    <h2>Total de Pedidos</h2>
    <div class="numero" id="totalPedidos">0</div>
  </div>

  <div class="card">
    <h2>Pendentes</h2>
    <div class="numero" id="pendentes">0</div>
  </div>

  <div class="card">
    <h2>Em Atendimento</h2>
    <div class="numero" id="andamento">0</div>
  </div>

  <div class="card">
    <h2>Finalizados</h2>
    <div class="numero" id="finalizados">0</div>
  </div>

</div>

<div id="lista">
  Carregando pedidos...
</div>

<script>

function sair(){

  localStorage.removeItem("adminLogado");

  window.location.href = "/login.html";

}

async function carregarPedidos(){

  const resposta = await fetch("/pedidos");

  const pedidos = await resposta.json();

  document.getElementById("totalPedidos").innerText = pedidos.length;

  document.getElementById("pendentes").innerText =
    pedidos.filter(p => !p.status || p.status === "Pendente").length;

  document.getElementById("andamento").innerText =
    pedidos.filter(p => p.status === "Em atendimento").length;

  document.getElementById("finalizados").innerText =
    pedidos.filter(p => p.status === "Finalizado").length;

  const lista = document.getElementById("lista");

  if(!pedidos.length){

    lista.innerHTML = "Nenhum pedido encontrado.";

    return;

  }

  lista.innerHTML = "";

  pedidos.forEach(p => {

    let classeStatus = "pendente";

    if(p.status === "Em atendimento"){
      classeStatus = "andamento";
    }

    if(p.status === "Finalizado"){
      classeStatus = "finalizado";
    }

    lista.innerHTML += `

      <div class="pedido">

        <h2>${p.nome}</h2>

        <p><strong>WhatsApp:</strong> ${p.whatsapp}</p>

        <p><strong>Cidade:</strong> ${p.cidade}</p>

        <p><strong>Estado:</strong> ${p.estado}</p>

        <p><strong>Descrição:</strong> ${p.descricao}</p>

        <div class="status ${classeStatus}">
          ${p.status || "Pendente"}
        </div>

        <div class="acoes">

          <a href="https://wa.me/55${p.whatsapp}" target="_blank">
            <button class="btn3">
              WhatsApp
            </button>
          </a>

          <button class="btn1"
          onclick="alterarStatus(${p.id}, 'Em atendimento')">

            Em atendimento

          </button>

          <button class="btn2"
          onclick="alterarStatus(${p.id}, 'Finalizado')">

            Finalizado

          </button>

        </div>

      </div>

    `;

  });

}

async function alterarStatus(id, status){

  await fetch(`/status/${id}`, {

    method:"PUT",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({ status })

  });

  carregarPedidos();

}

carregarPedidos();

</script>

</body>
</html>
