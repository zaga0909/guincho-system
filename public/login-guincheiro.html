<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login Guincheiro</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial;
      background:#071a33;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .box{
      background:white;
      width:100%;
      max-width:420px;
      padding:35px;
      border-radius:25px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }

    h1{
      color:#071a33;
      margin-bottom:25px;
      text-align:center;
    }

    input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #ccc;
      margin-bottom:15px;
      font-size:15px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#ff8c00;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .erro{
      margin-top:15px;
      color:red;
      text-align:center;
      font-weight:bold;
    }

  </style>
</head>

<body>

<div class="box">

  <h1>🚛 Login Guincheiro</h1>

  <form id="form">

    <input
    type="text"
    id="whatsapp"
    placeholder="WhatsApp"
    required>

    <input
    type="password"
    id="senha"
    placeholder="Senha"
    required>

    <button type="submit">
      Entrar
    </button>

  </form>

  <div class="erro" id="erro"></div>

</div>

<script>

const form = document.getElementById("form");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const resposta = await fetch("/login-guincheiro", {

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({

      whatsapp:
      document.getElementById("whatsapp").value,

      senha:
      document.getElementById("senha").value

    })

  });

  const resultado = await resposta.json();

  if(resultado.sucesso){

    localStorage.setItem(

      "guincheiro",

      JSON.stringify(resultado.guincheiro)

    );

    window.location.href =
      "/painel-guincheiro.html";

  }else{

    document.getElementById("erro").innerText =
      resultado.erro;

  }

});

</script>

</body>
</html>
